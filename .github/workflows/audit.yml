name: Docker Security Audit

on:
  push:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Pull nginx:1.21
        run: docker pull nginx:1.21

      - name: Pull nginx:latest
        run: docker pull nginx:latest

      - name: Run audit on nginx:1.21
        run: bash audit.sh nginx:1.21

      - name: Run audit on nginx:latest
        run: bash audit.sh nginx:latest
